<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>성공일정</title>
    <!-- 메타 태그 설정, 저자, 키워드, 설명 -->
    <meta name="author" content="김지안" />
    <meta
      name="keyword"
      content="성공일정, 아이젠하워 매트릭스, 일정관리, 업무분배 우선순위"
    />
    <meta name="description" content="일정관리 홈페이지를 만들며 실습합니다" />

    <!-- 파비콘 -->
    <link rel="shortcut icon" href="./img/favicon.ico" type="image/x-icon" />
    <!-- 아이폰 파비콘 -->
    <link rel="apple-touch icon" href="./img/favicon.ico" />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link rel="stylesheet" href="css/signup.css" />
  </head>
  <body>
    <header>
      <div class="inner">
        <div class="header-container">
          <div class="title">
            <a href="#">성공일정</a>
          </div>

          <div class="sign-container">
            <div class="unsigned">
              <div class="sign-in"><a href="#">로그인</a></div>
              <div class="sign-up"><a href="">회원가입</a></div>
            </div>

            <div class="signed hidden">
              <div class="dropdown">
                <div class="dropdown-button">
                  안녕하세요. <span>어쩌구</span>님.
                </div>
                <i class="fa-solid fa-caret-down"></i>
              </div>

              <div class="dropdown-content">
                <button class="sign-out">로그아웃</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="inner">
        <div class="signup-container">
          <h1>안녕하세요. <span class="blue">성공일정</span>입니다.</h1>
          <div class="signup-form">
            <input type="text" placeholder="이메일" id="email" />
            <div class="email-message message">
              이메일 형식으로 입력해 주세요.
            </div>
            <input type="password" placeholder="비밀번호" id="password" />
            <div class="password-message message">
              영문, 숫자, 특수문자 조합 8자 이상 입력
            </div>
            <input
              type="password"
              placeholder="비밀번호확인"
              id="password-confirm"
            />
            <div class="password-confirm-message message">
              비밀번호가 일치하지 않습니다
            </div>
            <input type="text" placeholder="닉네임" id="nickname" />
            <div class="nickname-message message">
              한글 or영어 2-10자로 설정해 주세요
            </div>
            <input type="button" value="회원가입" id="signup" />
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="inner">
        <div class="footer-container">
          <div class="author">개발자 | 김지안</div>
          <div class="author-email">이메일 | j14n526@gmail.com</div>
        </div>
      </div>
    </footer>
  </body>
</html>
